<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Relatório de Requisições - SGC Customic</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
  </head>
  <body>
    <div id="sidebar-container" class="sidebar"></div>

    <div class="main-content">
      <div class="container">
        <h1>
          <i class="fa-solid fa-clipboard-list"></i>
          Relatório de Requisições
        </h1>

        <!-- Filtros -->
        <div class="card">
          <h2>Filtros do Relatório</h2>
          <div class="filter-container">
            <div class="form-group">
              <label for="dataInicio" style="font-size: 16px; font-weight: bold;">Data Início:</label>
              <input type="date" id="dataInicio" style="font-size: 16px; padding: 12px; height: 45px;" required />
            </div>
            <div class="form-group">
              <label for="dataFim" style="font-size: 16px; font-weight: bold;">Data Fim:</label>
              <input type="date" id="dataFim" style="font-size: 16px; padding: 12px; height: 45px;" required />
            </div>
            <div class="form-group">
              <label for="filtroStatus" style="font-size: 16px; font-weight: bold;">Status:</label>
              <select id="filtroStatus" style="font-size: 16px; padding: 12px; height: 45px;">
                <option value="">Todos</option>
                <option value="Pendente">Pendente</option>
                <option value="Parcial">Parcial</option>
                <option value="Concluído">Concluído</option>
              </select>
            </div>
            <div class="form-group">
              <button id="gerarRelatorioBtn" class="btn-destaque">
                <i class="fa-solid fa-magnifying-glass-chart"></i>
                Gerar Relatório
              </button>
            </div>
          </div>
        </div>

        <!-- Totalizadores -->
        <div id="totalizadoresContainer" style="display: none">
          <div class="estatisticas-inventario">
            <div class="stat-card" style="background: linear-gradient(135deg, #a8d5ba 0%, #7fb892 100%);">
              <i class="fa-solid fa-clipboard-list" style="color: #1e5631; text-shadow: 1px 1px 2px rgba(255,255,255,0.5);"></i>
              <p style="color: #1e5631; font-weight: 600; text-shadow: 1px 1px 2px rgba(255,255,255,0.5);">Total de Requisições</p>
              <strong id="totalRequisicoes" style="color: #0d3b1a; text-shadow: 1px 1px 3px rgba(255,255,255,0.6);">0</strong>
            </div>
            <div class="stat-card" style="background: linear-gradient(135deg, #7fb3d5 0%, #5a9bc9 100%);">
              <i class="fa-solid fa-cubes" style="color: #0d3d5a; text-shadow: 1px 1px 2px rgba(255,255,255,0.5);"></i>
              <p style="color: #0d3d5a; font-weight: 600; text-shadow: 1px 1px 2px rgba(255,255,255,0.5);">Total de Itens</p>
              <strong id="totalItens" style="color: #062638; text-shadow: 1px 1px 3px rgba(255,255,255,0.6);">0</strong>
            </div>
            <div class="stat-card" style="background: linear-gradient(135deg, #90ee90 0%, #6bcf6b 100%);">
              <i class="fa-solid fa-check-circle" style="color: #1e5631; text-shadow: 1px 1px 2px rgba(255,255,255,0.5);"></i>
              <p style="color: #1e5631; font-weight: 600; text-shadow: 1px 1px 2px rgba(255,255,255,0.5);">Concluídas</p>
              <strong id="totalConcluidas" style="color: #0d3b1a; text-shadow: 1px 1px 3px rgba(255,255,255,0.6);">0</strong>
            </div>
            <div class="stat-card" style="background: linear-gradient(135deg, #ffd966 0%, #f5c842 100%);">
              <i class="fa-solid fa-clock" style="color: #5a4000; text-shadow: 1px 1px 2px rgba(255,255,255,0.4);"></i>
              <p style="color: #5a4000; font-weight: 600; text-shadow: 1px 1px 2px rgba(255,255,255,0.4);">Pendentes</p>
              <strong id="totalPendentes" style="color: #3d2a00; text-shadow: 1px 1px 3px rgba(255,255,255,0.5);">0</strong>
            </div>
            <div class="stat-card" style="background: linear-gradient(135deg, #9fc5e8 0%, #6fa8dc 100%);">
              <i class="fa-solid fa-hourglass-half" style="color: #0d3d5a; text-shadow: 1px 1px 2px rgba(255,255,255,0.5);"></i>
              <p style="color: #0d3d5a; font-weight: 600; text-shadow: 1px 1px 2px rgba(255,255,255,0.5);">Parciais</p>
              <strong id="totalParciais" style="color: #062638; text-shadow: 1px 1px 3px rgba(255,255,255,0.6);">0</strong>
            </div>
            <div class="stat-card" style="background: linear-gradient(135deg, #dc3545 0%, #c82333 100%);">
              <i class="fa-solid fa-exclamation-circle" style="color: white; text-shadow: 1px 1px 3px rgba(0,0,0,0.3);"></i>
              <p style="color: white; font-weight: 600; text-shadow: 1px 1px 3px rgba(0,0,0,0.3);">🔴 Prioridade Alta</p>
              <strong id="totalPrioridadeAlta" style="color: white; text-shadow: 2px 2px 4px rgba(0,0,0,0.4);">0</strong>
            </div>
            <div class="stat-card" style="background: linear-gradient(135deg, #ffc107 0%, #e0a800 100%);">
              <i class="fa-solid fa-circle" style="color: #5a4000; text-shadow: 1px 1px 2px rgba(255,255,255,0.4);"></i>
              <p style="color: #5a4000; font-weight: 600; text-shadow: 1px 1px 2px rgba(255,255,255,0.4);">🟡 Prioridade Normal</p>
              <strong id="totalPrioridadeNormal" style="color: #3d2a00; text-shadow: 1px 1px 3px rgba(255,255,255,0.5);">0</strong>
            </div>
            <div class="stat-card" style="background: linear-gradient(135deg, #28a745 0%, #218838 100%);">
              <i class="fa-solid fa-arrow-down" style="color: white; text-shadow: 1px 1px 3px rgba(0,0,0,0.3);"></i>
              <p style="color: white; font-weight: 600; text-shadow: 1px 1px 3px rgba(0,0,0,0.3);">🟢 Prioridade Baixa</p>
              <strong id="totalPrioridadeBaixa" style="color: white; text-shadow: 2px 2px 4px rgba(0,0,0,0.4);">0</strong>
            </div>
            <div class="stat-card" style="background: linear-gradient(135deg, #d9b3e6 0%, #c18ad4 100%);">
              <i class="fa-solid fa-calendar-days" style="color: #3d1554; text-shadow: 1px 1px 2px rgba(255,255,255,0.4);"></i>
              <p style="color: #3d1554; font-weight: 600; text-shadow: 1px 1px 2px rgba(255,255,255,0.4);">Período Selecionado</p>
              <strong id="periodoInfo" style="color: #2a0a3a; text-shadow: 1px 1px 3px rgba(255,255,255,0.5);">-</strong>
            </div>
          </div>
        </div>

        <!-- Tabela de Resultados -->
        <div id="resultadosContainer" style="display: none" class="card">
          <div class="table-actions">
            <h2>Detalhamento de Requisições</h2>
            <div>
              <button id="imprimirBtn" class="btn-secundario">
                <i class="fa-solid fa-print"></i> Imprimir
              </button>
              <button id="exportarExcelBtn" class="btn-success">
                <i class="fa-solid fa-file-excel"></i> Exportar Excel
              </button>
            </div>
          </div>
          <div id="tabelaRelatorio"></div>
        </div>

        <div id="statusMessage" class="status-message"></div>
      </div>
    </div>

    <!-- Biblioteca para exportar Excel -->
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <script src="relatorioRequisicoes.js"></script>
    <script src="layout.js"></script>
    <script src="fundos.js"></script>
  </body>
</html>
