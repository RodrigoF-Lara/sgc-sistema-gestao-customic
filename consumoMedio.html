<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Consumo Médio - SGC Customic</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
  </head>
  <body>
    <div id="sidebar-container" class="sidebar"></div>

    <div class="main-content">
      <div class="container">
        <h1>
          <i class="fa-solid fa-chart-bar"></i>
          Relatório de Consumo Médio
        </h1>

        <!-- Filtros -->
        <div class="card">
          <h2>Período de Análise</h2>
          <div class="filter-container">
            <div class="form-group">
              <label for="dataPeriodo" style="font-size: 16px; font-weight: bold;">Período (Ano-Mês):</label>
              <input type="month" id="dataPeriodo" style="font-size: 16px; padding: 12px; height: 45px;" required />
            </div>
            <div class="form-group">
              <label for="filtroFornecedor" style="font-size: 16px; font-weight: bold;">Fornecedor (Opcional):</label>
              <input type="text" id="filtroFornecedor" placeholder="Digite para filtrar..." style="font-size: 16px; padding: 12px; height: 45px;" />
            </div>
            <div class="form-group">
              <button id="gerarRelatorioBtn" class="btn-destaque">
                <i class="fa-solid fa-magnifying-glass-chart"></i>
                Gerar Relatório
              </button>
            </div>
          </div>
        </div>

        <!-- Totalizadores -->
        <div id="totalizadoresContainer" style="display: none">
          <div class="estatisticas-inventario">
            <div class="stat-card">
              <i class="fa-solid fa-box-archive"></i>
              <p>Total de Itens</p>
              <strong id="totalItens">0</strong>
            </div>
            <div class="stat-card">
              <i class="fa-solid fa-money-bill"></i>
              <p>Valor Total em Estoque</p>
              <strong id="valorTotalEstoque">R$ 0,00</strong>
            </div>
            <div class="stat-card">
              <i class="fa-solid fa-building"></i>
              <p>Fornecedores Únicos</p>
              <strong id="totalFornecedores">0</strong>
            </div>
            <div class="stat-card">
              <i class="fa-solid fa-calendar-days"></i>
              <p>Período Consultado</p>
              <strong id="periodoInfo">-</strong>
            </div>
          </div>
        </div>

        <!-- Tabela de Resultados -->
        <div id="resultadosContainer" style="display: none" class="card">
          <div class="table-actions">
            <h2>Consumo de Estoque</h2>
            <div>
              <button id="imprimirBtn" class="btn-secundario">
                <i class="fa-solid fa-print"></i> Imprimir
              </button>
              <button id="exportarExcelBtn" class="btn-success">
                <i class="fa-solid fa-file-excel"></i> Exportar Excel
              </button>
            </div>
          </div>
          <!-- Filtro rápido por código/descrição -->
          <div style="margin-bottom:12px; display:flex; align-items:center; gap:10px;">
            <i class="fa fa-filter" style="color:#888;"></i>
            <input type="text" id="filtroCodigo" placeholder="Filtrar por código ou descrição..." style="max-width:320px; padding:8px 12px; font-size:14px; border:1px solid #ccc; border-radius:6px;" />
            <span id="filtroContagem" style="font-size:13px; color:#888;"></span>
          </div>
          <div id="tabelaRelatorio"></div>
        </div>

        <div id="statusMessage" class="status-message"></div>
      </div>
    </div>

    <!-- Modal de movimentações -->
    <div id="modal-movimentacoes" style="display:none; position:fixed; z-index:2000; inset:0; background:rgba(0,0,0,.55);">
      <div style="background:#fff; border-radius:10px; max-width:900px; width:96%; margin:40px auto; max-height:85vh; display:flex; flex-direction:column; box-shadow:0 8px 32px rgba(0,0,0,.2);">
        <div style="display:flex; align-items:center; justify-content:space-between; padding:16px 20px; border-bottom:1px solid #e0e0e0;">
          <div>
            <h3 id="modal-mov-titulo" style="margin:0; font-size:16px; color:#333;"></h3>
            <span id="modal-mov-subtitulo" style="font-size:13px; color:#888;"></span>
          </div>
          <button id="modal-mov-fechar" style="background:none; border:none; font-size:22px; cursor:pointer; color:#666; padding:0 6px;">&times;</button>
        </div>
        <div style="overflow-y:auto; padding:16px 20px;">
          <div id="modal-mov-corpo"></div>
        </div>
      </div>
    </div>

    <!-- Biblioteca para exportar Excel -->
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <script src="consumoMedio.js"></script>
    <script src="layout.js"></script>
    <script src="fundos.js"></script>
  </body>
</html>
