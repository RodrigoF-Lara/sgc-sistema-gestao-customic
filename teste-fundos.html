<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste de Fundos</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }
        .teste-container {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }
        .teste-box {
            width: 300px;
            height: 200px;
            border: 2px solid #333;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            position: relative;
        }
        .teste-label {
            position: absolute;
            bottom: 10px;
            left: 10px;
            background: rgba(255,255,255,0.8);
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
        }
        .status {
            padding: 10px 20px;
            background: #f0f0f0;
            border-radius: 4px;
            margin: 20px;
        }
    </style>
</head>
<body>
    <div class="teste-container">
        <h1>Teste de Carregamento de Fundos</h1>
        <div class="status" id="status">Carregando...</div>
        
        <div class="teste-box" id="teste1">
            <div class="teste-label">Teste 1: /img/fundo_menu_principal/fundo_1.jpeg</div>
        </div>
        
        <div class="teste-box" id="teste2">
            <div class="teste-label">Teste 2: /img/fundo_menu_principal/fundo_2.jpeg</div>
        </div>
        
        <div class="teste-box" id="teste3">
            <div class="teste-label">Teste 3: /img/fundo_menu_principal/fundo_3.gif</div>
        </div>
        
        <button onclick="testarAPI()">Testar API /api/fundos</button>
    </div>
    
    <script>
        // Aplicar backgrounds
        document.getElementById('teste1').style.backgroundImage = "url('/img/fundo_menu_principal/fundo_1.jpeg')";
        document.getElementById('teste2').style.backgroundImage = "url('/img/fundo_menu_principal/fundo_2.jpeg')";
        document.getElementById('teste3').style.backgroundImage = "url('/img/fundo_menu_principal/fundo_3.gif')";
        
        // Testar carregamento de imagens
        const imagens = [
            '/img/fundo_menu_principal/fundo_1.jpeg',
            '/img/fundo_menu_principal/fundo_2.jpeg',
            '/img/fundo_menu_principal/fundo_3.gif'
        ];
        
        Promise.all(imagens.map(src => {
            return new Promise((resolve, reject) => {
                const img = new Image();
                img.onload = () => resolve({ src, status: 'OK', width: img.width, height: img.height });
                img.onerror = () => reject({ src, status: 'ERRO 404' });
                img.src = src;
            });
        }))
        .then(results => {
            console.log('✓ Todas as imagens carregaram:', results);
            document.getElementById('status').innerHTML = 
                '✅ <strong>Sucesso!</strong> Todas as ' + results.length + ' imagens carregaram corretamente.<br>' +
                results.map(r => `${r.src}: ${r.width}x${r.height}px`).join('<br>');
            document.getElementById('status').style.background = '#d4edda';
            document.getElementById('status').style.color = '#155724';
        })
        .catch(error => {
            console.error('❌ Erro ao carregar imagem:', error);
            document.getElementById('status').innerHTML = 
                '❌ <strong>Erro!</strong> Falha ao carregar: ' + error.src;
            document.getElementById('status').style.background = '#f8d7da';
            document.getElementById('status').style.color = '#721c24';
        });
        
        async function testarAPI() {
            try {
                const response = await fetch('/api/fundos');
                const data = await response.json();
                console.log('API Response:', data);
                alert('✓ API funcionando!\n\nImagens: ' + data.imagens.join(', ') + '\nTotal: ' + data.total);
            } catch (error) {
                console.error('Erro na API:', error);
                alert('❌ Erro na API: ' + error.message);
            }
        }
    </script>
</body>
</html>
