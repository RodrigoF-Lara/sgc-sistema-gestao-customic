<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Menu Principal - Kardex</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
  </head>
  <body class="menu-body">
    <!-- O novo menu lateral será carregado aqui pelo layout.js -->
    <div id="sidebar-container" class="sidebar"></div>

    <!-- Todo o conteúdo da página fica dentro desta div -->
    <div class="main-content">
      <div class="container">
        <!-- O conteúdo específico da página de menu vai aqui -->
        <div class="menu-header">
          <h1>Menu Principal</h1>
          <p id="welcomeMessage">Olá! Selecione uma opção para começar.</p>
        </div>
        <!-- substitua a div .menu-options existente por isto -->
        <div class="menu-options">
          <a href="novaRequisicao.html" class="menu-option-card">
            <i class="fa-solid fa-file-circle-plus"></i>
            <h2>Nova Requisição</h2>
          </a>

          <a href="consulta.html" class="menu-option-card">
            <i class="fa-solid fa-magnifying-glass"></i>
            <h2>Consultar Requisições</h2>
          </a>

          <a href="estoque.html" class="menu-option-card">
            <i class="fa-solid fa-archive"></i>
            <h2>Gerenciar Estoque</h2>
          </a>

          <a href="statusNF.html" class="menu-option-card">
            <i class="fa-solid fa-barcode"></i>
            <h2>Status NF</h2>
          </a>

          <a href="inventarioCiclico.html" class="menu-option-card">
            <i class="fa-solid fa-clipboard-check"></i>
            <h2>Inventário Cíclico</h2>
          </a>

          <a href="relatorios.html" class="menu-option-card">
            <i class="fa-solid fa-chart-bar"></i>
            <h2>Relatórios</h2>
          </a>
        </div>
      </div>
    </div>

    <!-- O novo script de layout que carrega o menu e o usuário -->
    <script src="layout.js"></script>
    <!-- Script adicional para personalizar a mensagem de boas-vindas -->
    <script>
      document.addEventListener("DOMContentLoaded", function () {
        const userName = localStorage.getItem("userName");
        if (userName) {
          const welcomeMessage = document.getElementById("welcomeMessage");
          welcomeMessage.textContent = `Olá, ${userName}! Selecione uma opção para começar.`;
        }
      });
    </script>
    <!-- Script para troca suave de fundos -->
    <script>
      (async function() {
        let fundosDisponiveis = [];
        
        try {
          // Buscar lista de imagens da API
          const response = await fetch('/api/fundos');
          const data = await response.json();
          
          if (data.success && data.imagens.length > 0) {
            fundosDisponiveis = data.imagens;
            console.log(`✓ Carregadas ${data.total} imagens de fundo`);
          } else {
            throw new Error('Nenhuma imagem encontrada');
          }
        } catch (error) {
          console.warn('Erro ao carregar fundos da API, usando padrão:', error);
          // Fallback: usar lista padrão
          fundosDisponiveis = ['fundo_1.jpeg'];
        }
        
        // Embaralhar imagens para começar em ordem aleatória
        fundosDisponiveis.sort(() => Math.random() - 0.5);
        
        let indiceAtual = 0;
        let usandoBefore = true;
        const body = document.body;
        
        // Define a primeira imagem
        body.style.setProperty('--fundo-atual', `url('img/fundo_menu_principal/${fundosDisponiveis[indiceAtual]}')`);
        
        function trocarFundo() {
          // Próximo índice
          indiceAtual = (indiceAtual + 1) % fundosDisponiveis.length;
          const proximoFundo = `url('img/fundo_menu_principal/${fundosDisponiveis[indiceAtual]}')`;
          
          if (usandoBefore) {
            // Troca para ::after
            body.style.setProperty('--fundo-proximo', proximoFundo);
            // Fade out ::before, fade in ::after
            body.classList.add('fade-to-after');
          } else {
            // Troca para ::before
            body.style.setProperty('--fundo-atual', proximoFundo);
            // Fade in ::before, fade out ::after
            body.classList.remove('fade-to-after');
          }
          
          usandoBefore = !usandoBefore;
        }
        
        // Define as imagens iniciais
        const style = document.createElement('style');
        const segundaImagem = fundosDisponiveis.length > 1 ? fundosDisponiveis[1] : fundosDisponiveis[0];
        style.textContent = `
          body.menu-body::before {
            background-image: var(--fundo-atual, url('img/fundo_menu_principal/${fundosDisponiveis[0]}'));
          }
          body.menu-body::after {
            background-image: var(--fundo-proximo, url('img/fundo_menu_principal/${segundaImagem}'));
          }
          body.menu-body.fade-to-after::before {
            opacity: 0;
          }
          body.menu-body.fade-to-after::after {
            opacity: 1;
          }
        `;
        document.head.appendChild(style);
        
        // Troca a cada 30 segundos (só se houver mais de uma imagem)
        if (fundosDisponiveis.length > 1) {
          setInterval(trocarFundo, 30000);
        }
      })();
    </script>
  </body>
</html>
