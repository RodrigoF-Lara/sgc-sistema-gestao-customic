<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cadastros - SGC Customic</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
  </head>
  <body>
    <div id="sidebar-container" class="sidebar"></div>

    <div class="main-content">
      <div class="container">
        <h1>Cadastros</h1>
        <p class="info-message">Selecione um cadastro para gerenciar:</p>

        <div class="menu-options">
          <!-- Cadastro de Produtos -->
          <a href="cadastroProdutos.html" class="menu-option-card">
            <i class="fa-solid fa-box-open"></i>
            <h2>Cadastro de Produtos</h2>
            <p style="font-size: 0.9em; color: #666; margin-top: 10px">
              Gerencie a classificação ABC dos produtos
            </p>
          </a>

          <!-- Futuros cadastros -->
          <div
            class="menu-option-card"
            style="opacity: 0.5; cursor: not-allowed"
          >
            <i class="fa-solid fa-truck"></i>
            <h2>Cadastro de Fornecedores</h2>
            <p style="font-size: 0.9em; color: #666; margin-top: 10px">
              Em breve
            </p>
          </div>

          <div
            class="menu-option-card"
            style="opacity: 0.5; cursor: not-allowed"
          >
            <i class="fa-solid fa-users"></i>
            <h2>Cadastro de Usuários</h2>
            <p style="font-size: 0.9em; color: #666; margin-top: 10px">
              Em breve
            </p>
          </div>
        </div>
      </div>
    </div>

    <script src="layout.js"></script>
    <script src="fundos.js"></script>
  </body>
</html>
